<!DOCTYPE html>
<html lang="ja"><head><meta charset="utf-8"><style>
*{margin:0;box-sizing:border-box}
body{width:1200px;height:630px;overflow:hidden;
  font-family:"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
  background:linear-gradient(155deg,#14281e 0%,#1f5c3d 55%,#2b7a52 100%);
  color:#fff;position:relative}
.pad{position:absolute;inset:0;padding:74px 84px;display:flex;flex-direction:column;justify-content:space-between}
.top{display:flex;align-items:center;gap:16px}
.logo{font-size:34px;font-weight:900;letter-spacing:.04em}
.logo small{display:block;font-size:13px;font-weight:500;opacity:.7;letter-spacing:.32em;margin-top:2px}
.badge{margin-left:auto;font-size:16px;font-weight:700;color:#bfe3cf;border:1.5px solid rgba(191,227,207,.45);
  border-radius:30px;padding:8px 22px}
h1{font-size:66px;font-weight:900;line-height:1.28;letter-spacing:.01em}
h1 .u{background:linear-gradient(transparent 66%,rgba(255,255,255,.26) 66%)}
.lead{font-size:26px;color:#d9eae0;margin-top:22px;line-height:1.6}
.foot{display:flex;gap:14px;flex-wrap:wrap}
.chip{font-size:19px;font-weight:700;color:#eafaf1;background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.2);border-radius:12px;padding:11px 20px}
</style></head><body>
<div class="pad">
  <div class="top">
    <div class="logo">タバネル<small>TABANERU</small></div>
    <div class="badge">出張・訪問サービスの個人事業主へ</div>
  </div>
  <div>
    <h1>現場仕事の1日を、<br><span class="u">これひとつで束ねる。</span></h1>
    <p class="lead">予定・顧客・見積・請求・入金・お客様連絡まで、スマホひとつで。</p>
  </div>
  <div class="foot">
    <span class="chip">✓ ずっと無料</span>
    <span class="chip">✓ 広告なし</span>
    <span class="chip">✓ 登録不要</span>
    <span class="chip">✓ 圏外でも動く</span>
  </div>
</div>
</body></html>
