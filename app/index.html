<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ゲンバノート｜ひとり業務管理</title>
<style>
  :root{
    --bg:#f4f6f8; --card:#ffffff; --ink:#1f2933; --sub:#66727d;
    --line:#e3e8ec; --brand:#2f6f4f; --brand-d:#255a40; --accent:#e8f3ed;
    --warn:#c2410c; --warn-bg:#fdf1e7; --ok:#15803d; --shadow:0 1px 3px rgba(0,0,0,.08);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",Meiryo,sans-serif;
       background:var(--bg);color:var(--ink);-webkit-text-size-adjust:100%;padding-bottom:76px}
  h1,h2,h3{margin:0}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:16px}
  /* header */
  header{background:var(--brand);color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;
         position:sticky;top:0;z-index:20}
  header .brand{font-weight:700;font-size:18px;letter-spacing:.02em}
  header .brand small{display:block;font-weight:400;font-size:11px;opacity:.85;letter-spacing:.1em}
  header .yago{font-size:13px;opacity:.95;text-align:right;max-width:45%}
  .wrap{max-width:720px;margin:0 auto;padding:16px}
  .view{display:none}
  .view.active{display:block}
  /* cards */
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:16px;margin-bottom:14px}
  .card h3{font-size:14px;color:var(--sub);font-weight:600;margin-bottom:10px;letter-spacing:.02em}
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;box-shadow:var(--shadow)}
  .stat .num{font-size:26px;font-weight:700;line-height:1.1}
  .stat .lbl{font-size:12px;color:var(--sub);margin-top:4px}
  .stat.brand{background:var(--accent);border-color:#cfe6d8}
  .stat.warn .num{color:var(--warn)}
  /* buttons */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:10px;
       padding:12px 16px;font-size:15px;font-weight:600;background:var(--brand);color:#fff}
  .btn:active{background:var(--brand-d)}
  .btn.full{width:100%}
  .btn.ghost{background:#fff;color:var(--brand);border:1px solid var(--brand)}
  .btn.sub{background:#eef1f4;color:var(--ink)}
  .btn.sm{padding:8px 12px;font-size:13px;border-radius:8px}
  .btn.danger{background:#fff;color:#b91c1c;border:1px solid #f0c9c9}
  .row{display:flex;gap:8px;flex-wrap:wrap}
  /* list items */
  .item{display:flex;align-items:center;gap:12px;padding:12px 4px;border-bottom:1px solid var(--line)}
  .item:last-child{border-bottom:none}
  .item .main{flex:1;min-width:0}
  .item .t{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .item .s{font-size:12px;color:var(--sub);margin-top:2px}
  .pill{font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap}
  .pill.yotei{background:#eef2ff;color:#4338ca}
  .pill.kanryo{background:#ecfdf5;color:#15803d}
  .pill.seikyu{background:var(--warn-bg);color:var(--warn)}
  .pill.nyukin{background:#eef1f4;color:#475569}
  .empty{text-align:center;color:var(--sub);font-size:14px;padding:28px 10px}
  /* forms */
  label.f{display:block;font-size:12px;color:var(--sub);margin:12px 0 4px;font-weight:600}
  input.f,select.f,textarea.f{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:9px;background:#fff}
  textarea.f{min-height:64px;resize:vertical}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  /* modal */
  .modal-bg{position:fixed;inset:0;background:rgba(15,23,32,.5);display:none;align-items:flex-end;justify-content:center;z-index:50}
  .modal-bg.show{display:flex}
  .modal{background:#fff;width:100%;max-width:720px;max-height:92vh;overflow:auto;border-radius:16px 16px 0 0;padding:18px 18px 28px}
  .modal h2{font-size:17px;margin-bottom:4px}
  .modal .mtop{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .x{background:none;border:none;font-size:22px;color:var(--sub);line-height:1}
  /* line item editor */
  .li{display:grid;grid-template-columns:1fr 84px 34px;gap:8px;align-items:center;margin-bottom:8px}
  .li input{padding:9px 10px;border:1px solid var(--line);border-radius:8px}
  .li .del{background:none;border:none;color:#b91c1c;font-size:18px}
  .total-row{display:flex;justify-content:space-between;padding:8px 0;font-size:14px}
  .total-row.big{font-size:20px;font-weight:700;border-top:2px solid var(--ink);margin-top:6px;padding-top:10px}
  /* bottom nav */
  nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:flex;z-index:30}
  nav button{flex:1;background:none;border:none;padding:8px 2px 10px;color:var(--sub);font-size:11px;display:flex;flex-direction:column;align-items:center;gap:3px}
  nav button .ic{font-size:20px;line-height:1}
  nav button.active{color:var(--brand);font-weight:700}
  .fab{position:fixed;right:18px;bottom:88px;width:56px;height:56px;border-radius:50%;background:var(--brand);color:#fff;
       border:none;font-size:28px;box-shadow:0 4px 14px rgba(47,111,79,.4);z-index:25}
  /* document / print */
  .doc{background:#fff;color:#111;padding:24px;font-size:13px;line-height:1.6}
  .doc h1{font-size:22px;text-align:center;letter-spacing:.3em;margin-bottom:16px}
  .doc table{width:100%;border-collapse:collapse;margin:14px 0}
  .doc th,.doc td{border:1px solid #999;padding:7px 8px;text-align:left}
  .doc th{background:#f0f0f0}
  .doc .num{text-align:right}
  .doc .meta{display:flex;justify-content:space-between;gap:20px;flex-wrap:wrap}
  .doc .box{border:1px solid #999;padding:10px;min-width:200px}
  .muted{color:var(--sub);font-size:12px}
  @media print{
    body{background:#fff;padding:0}
    header,nav,.fab,.noprint{display:none!important}
    .wrap{max-width:none;padding:0}
    .card{border:none;box-shadow:none;margin:0}
    .doc{padding:0}
  }
</style>
</head>
<body>

<header>
  <div class="brand">ゲンバノート<small>GENBA NOTE</small></div>
  <div class="yago" id="hdrYago">屋号を設定してください</div>
</header>

<div class="wrap">

  <!-- ===== ダッシュボード ===== -->
  <section id="v-home" class="view active">
    <div class="stat-grid" style="margin-bottom:14px">
      <div class="stat brand"><div class="num" id="stMonthSales">¥0</div><div class="lbl">今月の売上（入金済＋完了）</div></div>
      <div class="stat"><div class="num" id="stMonthJobs">0</div><div class="lbl">今月の件数</div></div>
      <div class="stat warn"><div class="num" id="stUnbilled">0</div><div class="lbl">未請求の完了案件</div></div>
      <div class="stat"><div class="num" id="stCustomers">0</div><div class="lbl">顧客数</div></div>
    </div>
    <div class="card">
      <h3>今日の予定</h3>
      <div id="todayList"></div>
    </div>
    <div class="card">
      <h3>直近の予定</h3>
      <div id="upcomingList"></div>
    </div>
  </section>

  <!-- ===== 予約 ===== -->
  <section id="v-jobs" class="view">
    <div class="card">
      <div class="row" style="justify-content:space-between;align-items:center;margin-bottom:6px">
        <h3 style="margin:0">案件一覧</h3>
        <select class="f" id="jobFilter" style="width:auto;padding:8px 10px">
          <option value="all">すべて</option>
          <option value="予定">予定</option>
          <option value="完了">完了（未請求）</option>
          <option value="請求済">請求済</option>
          <option value="入金済">入金済</option>
        </select>
      </div>
      <div id="jobList"></div>
    </div>
  </section>

  <!-- ===== 顧客 ===== -->
  <section id="v-customers" class="view">
    <div class="card">
      <h3>顧客一覧</h3>
      <div id="custList"></div>
    </div>
  </section>

  <!-- ===== 設定 ===== -->
  <section id="v-settings" class="view">
    <div class="card">
      <h3>屋号・事業者情報（見積/請求書に表示）</h3>
      <label class="f">屋号 / 事業者名</label>
      <input class="f" id="setYago" placeholder="例：山田おそうじサービス">
      <label class="f">担当者名</label>
      <input class="f" id="setName" placeholder="例：山田 太郎">
      <div class="two">
        <div><label class="f">電話番号</label><input class="f" id="setPhone" placeholder="090-xxxx-xxxx"></div>
        <div><label class="f">登録番号 等</label><input class="f" id="setReg" placeholder="任意"></div>
      </div>
      <label class="f">住所</label>
      <input class="f" id="setAddr" placeholder="例：東京都〇〇区…">
      <label class="f">振込先・備考（請求書の下部に表示）</label>
      <textarea class="f" id="setNote" placeholder="例：〇〇銀行 △△支店 普通 1234567 ヤマダタロウ"></textarea>
      <button class="btn full" style="margin-top:14px" onclick="saveProfile()">保存する</button>
    </div>

    <div class="card">
      <h3>サービスメニュー（見積作成が速くなります）</h3>
      <div id="menuList"></div>
      <div class="li" style="margin-top:6px">
        <input id="newMenuName" placeholder="サービス名 例：エアコン清掃">
        <input id="newMenuPrice" type="number" inputmode="numeric" placeholder="単価">
        <button class="btn sm" onclick="addMenu()">＋</button>
      </div>
    </div>

    <div class="card">
      <h3>データのバックアップ</h3>
      <p class="muted" style="margin:0 0 10px">データはこの端末のブラウザ内にのみ保存されます。機種変更前に書き出してください。</p>
      <div class="row">
        <button class="btn sub sm" onclick="exportData()">書き出す（JSON）</button>
        <button class="btn sub sm" onclick="document.getElementById('importFile').click()">読み込む</button>
        <input type="file" id="importFile" accept="application/json" style="display:none" onchange="importData(event)">
      </div>
    </div>
    <p class="muted" style="text-align:center">ゲンバノート MVP・v0.1</p>
  </section>

</div>

<!-- FAB -->
<button class="fab noprint" id="fab" onclick="fabAction()">＋</button>

<!-- bottom nav -->
<nav class="noprint">
  <button data-view="home" class="active" onclick="nav('home')"><span class="ic">🏠</span>ホーム</button>
  <button data-view="jobs" onclick="nav('jobs')"><span class="ic">📋</span>案件</button>
  <button data-view="customers" onclick="nav('customers')"><span class="ic">👤</span>顧客</button>
  <button data-view="settings" onclick="nav('settings')"><span class="ic">⚙️</span>設定</button>
</nav>

<!-- ===== Modal ===== -->
<div class="modal-bg" id="modalBg">
  <div class="modal" id="modalBody"></div>
</div>

<script>
/* ---------- storage ---------- */
const DB_KEY='genba_note_v1';
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
function load(){
  try{return JSON.parse(localStorage.getItem(DB_KEY))||{}}catch(e){return{}}
}
function seed(){
  const d=load();
  d.profile=d.profile||{yago:'',name:'',phone:'',reg:'',addr:'',note:''};
  d.menu=d.menu||[];
  d.customers=d.customers||[];
  d.jobs=d.jobs||[];
  return d;
}
let DB=seed();
function save(){try{localStorage.setItem(DB_KEY,JSON.stringify(DB));}catch(e){/* プレビュー等で保存不可でも動作は継続 */}}

/* ---------- helpers ---------- */
const yen=n=>'¥'+(Number(n)||0).toLocaleString('ja-JP');
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const jobTotal=j=>(j.items||[]).reduce((s,i)=>s+(Number(i.price)||0)*(Number(i.qty)||1),0);
const ym=d=>d?d.slice(0,7):'';
const thisYM=()=>new Date().toISOString().slice(0,7);
const todayStr=()=>{const d=new Date();return d.toISOString().slice(0,10);};
function custName(id){const c=DB.customers.find(c=>c.id===id);return c?c.name:'（顧客未設定）';}
const STATUSES=['予定','完了','請求済','入金済'];
const pillClass={'予定':'yotei','完了':'kanryo','請求済':'seikyu','入金済':'nyukin'};

/* ---------- navigation ---------- */
let currentView='home';
function nav(v){
  currentView=v;
  document.querySelectorAll('.view').forEach(s=>s.classList.remove('active'));
  document.getElementById('v-'+v).classList.add('active');
  document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('active',b.dataset.view===v));
  document.getElementById('fab').style.display=(v==='home'||v==='settings')?'none':'flex';
  window.scrollTo(0,0);
  render();
}
function fabAction(){
  if(currentView==='customers')openCustomer();
  else openJob();
}

/* ---------- render ---------- */
function render(){
  const p=DB.profile;
  document.getElementById('hdrYago').textContent=p.yago||'屋号を設定してください';
  if(currentView==='home')renderHome();
  if(currentView==='jobs')renderJobs();
  if(currentView==='customers')renderCustomers();
  if(currentView==='settings')renderSettings();
}

function renderHome(){
  const m=thisYM();
  const monthJobs=DB.jobs.filter(j=>ym(j.date)===m);
  const sales=monthJobs.filter(j=>j.status==='入金済'||j.status==='完了'||j.status==='請求済')
                       .reduce((s,j)=>s+jobTotal(j),0);
  document.getElementById('stMonthSales').textContent=yen(sales);
  document.getElementById('stMonthJobs').textContent=monthJobs.length;
  document.getElementById('stUnbilled').textContent=DB.jobs.filter(j=>j.status==='完了').length;
  document.getElementById('stCustomers').textContent=DB.customers.length;

  const today=todayStr();
  const tl=DB.jobs.filter(j=>j.date===today).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  document.getElementById('todayList').innerHTML=tl.length?tl.map(jobRow).join(''):'<div class="empty">今日の予定はありません</div>';

  const up=DB.jobs.filter(j=>j.date>today&&j.status==='予定').sort((a,b)=>a.date.localeCompare(b.date)).slice(0,6);
  document.getElementById('upcomingList').innerHTML=up.length?up.map(jobRow).join(''):'<div class="empty">予定はありません</div>';
}

function jobRow(j){
  const t=jobTotal(j);
  const svc=(j.items||[]).map(i=>i.name).filter(Boolean).join('・')||'（内容未入力）';
  return `<div class="item" onclick="openJob('${j.id}')">
    <div class="main">
      <div class="t">${esc(custName(j.customerId))}</div>
      <div class="s">${esc(j.date||'日付未定')} ${esc(j.time||'')} ／ ${esc(svc)}</div>
    </div>
    <div style="text-align:right">
      <div style="font-weight:700;font-size:14px">${yen(t)}</div>
      <span class="pill ${pillClass[j.status]}">${esc(j.status)}</span>
    </div>
  </div>`;
}

function renderJobs(){
  const f=document.getElementById('jobFilter').value;
  let list=[...DB.jobs].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  if(f!=='all')list=list.filter(j=>j.status===f);
  document.getElementById('jobList').innerHTML=list.length?list.map(jobRow).join('')
    :'<div class="empty">案件がありません。右下の＋から追加できます。</div>';
}

function renderCustomers(){
  const list=[...DB.customers].sort((a,b)=>(a.name||'').localeCompare(b.name||'','ja'));
  document.getElementById('custList').innerHTML=list.length?list.map(c=>{
    const cnt=DB.jobs.filter(j=>j.customerId===c.id).length;
    return `<div class="item" onclick="openCustomer('${c.id}')">
      <div class="main"><div class="t">${esc(c.name)}</div>
      <div class="s">${esc(c.phone||'電話未登録')} ／ 案件${cnt}件</div></div>
      <span class="muted">›</span></div>`;
  }).join(''):'<div class="empty">顧客がいません。右下の＋から追加できます。</div>';
}

function renderSettings(){
  const p=DB.profile;
  setYago.value=p.yago||'';setName.value=p.name||'';setPhone.value=p.phone||'';
  setReg.value=p.reg||'';setAddr.value=p.addr||'';setNote.value=p.note||'';
  document.getElementById('menuList').innerHTML=DB.menu.length?DB.menu.map(m=>
    `<div class="item"><div class="main"><div class="t">${esc(m.name)}</div>
     <div class="s">${yen(m.price)}</div></div>
     <button class="btn danger sm" onclick="delMenu('${m.id}')">削除</button></div>`).join('')
    :'<div class="empty">未登録です</div>';
}

/* ---------- profile & menu ---------- */
function saveProfile(){
  DB.profile={yago:setYago.value.trim(),name:setName.value.trim(),phone:setPhone.value.trim(),
    reg:setReg.value.trim(),addr:setAddr.value.trim(),note:setNote.value.trim()};
  save();render();toast('保存しました');
}
function addMenu(){
  const name=newMenuName.value.trim();const price=Number(newMenuPrice.value)||0;
  if(!name)return toast('サービス名を入力してください');
  DB.menu.push({id:uid(),name,price});save();
  newMenuName.value='';newMenuPrice.value='';renderSettings();
}
function delMenu(id){DB.menu=DB.menu.filter(m=>m.id!==id);save();renderSettings();}

/* ---------- customer modal ---------- */
function openCustomer(id){
  const c=id?DB.customers.find(x=>x.id===id):{id:'',name:'',phone:'',addr:'',note:''};
  showModal(`
    <div class="mtop"><h2>${id?'顧客の編集':'顧客を追加'}</h2><button class="x" onclick="closeModal()">×</button></div>
    <label class="f">名前 *</label><input class="f" id="cName" value="${esc(c.name)}">
    <label class="f">電話番号</label><input class="f" id="cPhone" value="${esc(c.phone)}">
    <label class="f">住所</label><input class="f" id="cAddr" value="${esc(c.addr)}">
    <label class="f">メモ</label><textarea class="f" id="cNote">${esc(c.note)}</textarea>
    <button class="btn full" style="margin-top:14px" onclick="saveCustomer('${id||''}')">保存</button>
    ${id?`<button class="btn danger full" style="margin-top:8px" onclick="delCustomer('${id}')">この顧客を削除</button>`:''}
  `);
}
function saveCustomer(id){
  const name=cName.value.trim();if(!name)return toast('名前を入力してください');
  const obj={name,phone:cPhone.value.trim(),addr:cAddr.value.trim(),note:cNote.value.trim()};
  if(id){const c=DB.customers.find(x=>x.id===id);Object.assign(c,obj);}
  else DB.customers.push({id:uid(),...obj});
  save();closeModal();render();toast('保存しました');
}
function delCustomer(id){
  if(!confirm('この顧客を削除しますか？（案件は残ります）'))return;
  DB.customers=DB.customers.filter(c=>c.id!==id);save();closeModal();render();
}

/* ---------- job modal ---------- */
let draftItems=[];
function openJob(id){
  const j=id?DB.jobs.find(x=>x.id===id):{id:'',date:todayStr(),time:'',customerId:'',status:'予定',items:[],memo:''};
  draftItems=JSON.parse(JSON.stringify(j.items&&j.items.length?j.items:[{name:'',price:'',qty:1}]));
  const custOpts=DB.customers.map(c=>`<option value="${c.id}" ${c.id===j.customerId?'selected':''}>${esc(c.name)}</option>`).join('');
  const menuOpts=DB.menu.map(m=>`<option value="${m.id}">${esc(m.name)} (${yen(m.price)})</option>`).join('');
  const statusBtns=STATUSES.map(s=>`<button class="btn sm ${s===j.status?'':'sub'}" data-st="${s}" onclick="pickStatus(this)">${s}</button>`).join('');
  showModal(`
    <div class="mtop"><h2>${id?'案件の編集':'案件を追加'}</h2><button class="x" onclick="closeModal()">×</button></div>
    <div class="two">
      <div><label class="f">日付</label><input class="f" type="date" id="jDate" value="${esc(j.date)}"></div>
      <div><label class="f">時間</label><input class="f" type="time" id="jTime" value="${esc(j.time)}"></div>
    </div>
    <label class="f">顧客</label>
    <div class="row" style="align-items:center">
      <select class="f" id="jCust" style="flex:1">${custOpts||'<option value="">（顧客なし）</option>'}</select>
      <button class="btn ghost sm" onclick="quickAddCustomer()">＋新規</button>
    </div>
    <label class="f">作業内容 / 金額</label>
    ${DB.menu.length?`<select class="f" style="margin-bottom:8px" onchange="addFromMenu(this)"><option value="">＋メニューから追加…</option>${menuOpts}</select>`:''}
    <div id="itemsBox"></div>
    <button class="btn sub sm" onclick="addItem()" style="margin-top:2px">＋行を追加</button>
    <div class="total-row big"><span>合計（税込目安）</span><span id="jTotal">¥0</span></div>
    <label class="f">状態</label>
    <div class="row" id="statusRow" data-val="${esc(j.status)}">${statusBtns}</div>
    <label class="f">メモ（社内用）</label><textarea class="f" id="jMemo">${esc(j.memo)}</textarea>
    <button class="btn full" style="margin-top:14px" onclick="saveJob('${id||''}')">保存</button>
    <div class="row" style="margin-top:8px">
      <button class="btn ghost" style="flex:1" onclick="makeDoc('${id||''}','見積書')">見積書</button>
      <button class="btn ghost" style="flex:1" onclick="makeDoc('${id||''}','請求書')">請求書</button>
    </div>
    ${id?`<button class="btn danger full" style="margin-top:8px" onclick="delJob('${id}')">この案件を削除</button>`:''}
  `);
  renderItems();
}
function renderItems(){
  const box=document.getElementById('itemsBox');if(!box)return;
  box.innerHTML=draftItems.map((it,i)=>`
    <div class="li">
      <input placeholder="内容" value="${esc(it.name)}" oninput="draftItems[${i}].name=this.value">
      <input type="number" inputmode="numeric" placeholder="金額" value="${it.price}" oninput="draftItems[${i}].price=this.value;calcTotal()">
      <button class="del" onclick="rmItem(${i})">×</button>
    </div>`).join('');
  calcTotal();
}
function addItem(){draftItems.push({name:'',price:'',qty:1});renderItems();}
function rmItem(i){draftItems.splice(i,1);if(!draftItems.length)draftItems.push({name:'',price:'',qty:1});renderItems();}
function addFromMenu(sel){
  const m=DB.menu.find(x=>x.id===sel.value);if(!m)return;
  if(draftItems.length===1&&!draftItems[0].name&&!draftItems[0].price)draftItems=[];
  draftItems.push({name:m.name,price:m.price,qty:1});sel.value='';renderItems();
}
function calcTotal(){
  const t=draftItems.reduce((s,i)=>s+(Number(i.price)||0)*(Number(i.qty)||1),0);
  const el=document.getElementById('jTotal');if(el)el.textContent=yen(t);
}
function pickStatus(btn){
  document.getElementById('statusRow').dataset.val=btn.dataset.st;
  document.querySelectorAll('#statusRow button').forEach(b=>b.classList.toggle('sub',b!==btn));
}
function quickAddCustomer(){
  const name=prompt('顧客名を入力');if(!name)return;
  const c={id:uid(),name:name.trim(),phone:'',addr:'',note:''};
  DB.customers.push(c);save();
  const sel=document.getElementById('jCust');
  sel.insertAdjacentHTML('beforeend',`<option value="${c.id}" selected>${esc(c.name)}</option>`);
}
function saveJob(id){
  const items=draftItems.filter(i=>i.name||i.price).map(i=>({name:i.name.trim?i.name.trim():i.name,price:Number(i.price)||0,qty:Number(i.qty)||1}));
  const obj={date:jDate.value,time:jTime.value,customerId:jCust.value,
    status:document.getElementById('statusRow').dataset.val,items,memo:jMemo.value.trim()};
  if(id){const j=DB.jobs.find(x=>x.id===id);Object.assign(j,obj);}
  else DB.jobs.push({id:uid(),...obj});
  save();closeModal();render();toast('保存しました');
}
function delJob(id){if(!confirm('この案件を削除しますか？'))return;DB.jobs=DB.jobs.filter(j=>j.id!==id);save();closeModal();render();}

/* ---------- documents (見積 / 請求) ---------- */
function makeDoc(id,type){
  let j;
  if(id){j=DB.jobs.find(x=>x.id===id);}
  else{ // building from unsaved draft
    j={date:jDate.value,time:jTime.value,customerId:jCust.value,items:draftItems.filter(i=>i.name||i.price)};
  }
  const p=DB.profile;const c=DB.customers.find(x=>x.id===j.customerId);
  const items=(j.items||[]).map(i=>({name:i.name,price:Number(i.price)||0,qty:Number(i.qty)||1}));
  const sub=items.reduce((s,i)=>s+i.price*i.qty,0);
  const tax=Math.floor(sub*0.1);const total=sub+tax;
  const no=(type==='見積書'?'Q':'I')+(j.date||todayStr()).replace(/-/g,'').slice(2)+'-'+((DB.jobs.indexOf(j)+1)||1);
  const rows=items.map(i=>`<tr><td>${esc(i.name)}</td><td class="num">${i.qty}</td>
     <td class="num">${yen(i.price)}</td><td class="num">${yen(i.price*i.qty)}</td></tr>`).join('')
     ||'<tr><td colspan="4" style="text-align:center">項目がありません</td></tr>';
  showModal(`
    <div class="mtop noprint"><h2>${type}プレビュー</h2><button class="x" onclick="closeModal()">×</button></div>
    <div class="doc" id="docArea">
      <h1>${type}</h1>
      <div class="meta">
        <div>
          <div style="font-size:15px;font-weight:700">${esc(c?c.name:'　')} 御中</div>
          <div class="muted">発行日：${esc(j.date||todayStr())}</div>
          <div class="muted">No. ${esc(no)}</div>
          <p>下記の通り${type==='見積書'?'お見積り':'ご請求'}申し上げます。</p>
          <div class="box" style="margin-top:6px">
            <div style="font-size:11px;color:#666">${type==='見積書'?'御見積金額':'御請求金額'}</div>
            <div style="font-size:22px;font-weight:700">${yen(total)}<span style="font-size:12px">（税込）</span></div>
          </div>
        </div>
        <div class="box">
          <div style="font-weight:700">${esc(p.yago||'（屋号未設定）')}</div>
          <div>${esc(p.name||'')}</div>
          <div class="muted">${esc(p.addr||'')}</div>
          <div class="muted">TEL: ${esc(p.phone||'')}</div>
          <div class="muted">${esc(p.reg||'')}</div>
        </div>
      </div>
      <table>
        <thead><tr><th>内容</th><th class="num">数量</th><th class="num">単価</th><th class="num">金額</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <div style="display:flex;justify-content:flex-end">
        <div style="min-width:220px">
          <div class="total-row"><span>小計</span><span>${yen(sub)}</span></div>
          <div class="total-row"><span>消費税(10%)</span><span>${yen(tax)}</span></div>
          <div class="total-row big"><span>合計</span><span>${yen(total)}</span></div>
        </div>
      </div>
      ${p.note?`<div style="margin-top:14px"><div class="muted">お支払い / 備考</div><div>${esc(p.note).replace(/\n/g,'<br>')}</div></div>`:''}
    </div>
    <button class="btn full noprint" style="margin-top:14px" onclick="window.print()">🖨 印刷 / PDFで保存</button>
    <p class="muted noprint" style="text-align:center;margin-top:8px">※消費税は10%で自動計算した目安です</p>
  `);
}

/* ---------- backup ---------- */
function exportData(){
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='genba-note-backup-'+todayStr()+'.json';a.click();
}
function importData(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=()=>{try{const d=JSON.parse(r.result);
    if(!confirm('現在のデータを上書きします。よろしいですか？'))return;
    DB=Object.assign(seed(),d);save();render();toast('読み込みました');
  }catch(err){toast('ファイルを読み込めませんでした');}};
  r.readAsText(file);
}

/* ---------- modal & toast ---------- */
function showModal(html){document.getElementById('modalBody').innerHTML=html;document.getElementById('modalBg').classList.add('show');}
function closeModal(){document.getElementById('modalBg').classList.remove('show');}
document.getElementById('modalBg').addEventListener('click',e=>{if(e.target.id==='modalBg')closeModal();});
let toastT;
function toast(msg){
  let el=document.getElementById('toast');
  if(!el){el=document.createElement('div');el.id='toast';
    el.style.cssText='position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:#1f2933;color:#fff;padding:10px 18px;border-radius:24px;font-size:14px;z-index:99;opacity:0;transition:.2s;pointer-events:none';
    document.body.appendChild(el);}
  el.textContent=msg;el.style.opacity='1';
  clearTimeout(toastT);toastT=setTimeout(()=>el.style.opacity='0',1600);
}
document.getElementById('jobFilter').addEventListener('change',renderJobs);

/* ---------- first run ---------- */
render();
if(!DB.profile.yago && DB.jobs.length===0){
  toast('まず「設定」で屋号を入力しましょう');
}
</script>
</body>
</html>
